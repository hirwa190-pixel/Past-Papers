<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./Login.css" />
  </head>
  <body>
    <div class="desktop-5">
      <header class="frame-parent">
        <div class="search-wrapper">
          <div class="search">
            <input class="value" placeholder="Search" type="text" />

            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
<path d="M14 14L11.1 11.1M12.6667 7.33333C12.6667 10.2789 10.2789 12.6667 7.33333 12.6667C4.38781 12.6667 2 10.2789 2 7.33333C2 4.38781 4.38781 2 7.33333 2C10.2789 2 12.6667 4.38781 12.6667 7.33333Z" stroke="#1E1E1E" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
          </div>
        </div>
        <div class="rectangle-parent">
          <div class="frame-child"></div>
          <img
            class="frame-item"
            loading="lazy"
            alt=""
            src="./public/Rectangle-8@2x.png"
          />

          <div class="frame-wrapper">
            <div class="navigation-links-parent">
              <div class="navigation-links">
                <div class="home-wrapper">
                  <h3 class="home">Home</h3>
                </div>
                <div class="about-us-wrapper">
                  <h3 class="about-us">About Us</h3>
                </div>
                <div class="about-us-wrapper">
                  <h3 class="about-us">Mandate</h3>
                </div>
                <h3 class="register">Register</h3>
              </div>
              <div class="contact-parent">
                <b class="contact">Contact</b>
                <div class="contact-search">
                  <button class="search2">
                    <input class="value" placeholder="Search" type="text" />

                    <img class="search-icon" alt="" src="./public/Search.svg" />
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </header>
      <div class="desktop-5-inner">
        <div class="frame-group">
          <button class="rectangle-group">
            <div class="frame-inner"></div>
            <b class="contact-us">CONTACT US</b>
          </button>
          <button class="rectangle-container">
            <div class="rectangle-div"></div>
            <div class="were-here-to-container">
              <b class="b">🤏🏽😊 </b>
              <b class="were-here-to">We’re here to help!</b>
            </div>
          </button>
        </div>
      </div>
      <main class="contact-block-parent">
        <section class="contact-block">
          <div class="block-with-illustration">
            <section class="form">
              <div class="radio-buttons">
                <div class="get-a-quote">
                  <input class="radiobutton" type="radio" />

                  <div class="get-a-quote-wrapper">
                    <div class="get-a-quote2">Get a Quote</div>
                  </div>
                </div>
              </div>
              <div class="fields">
                <div class="field">
                  <div class="name">Name</div>
                  <div class="input">
                    <input class="name2" placeholder="Name" type="text" />
                  </div>
                </div>
                <div class="field">
                  <div class="name">Email*</div>
                  <div class="input2">
                    <input class="email2" placeholder="Email" type="text" />
                  </div>
                </div>
                <div class="field3">
                  <div class="name">Message*</div>
                  <div class="input3">
                    <div class="message2">Message</div>
                  </div>
                </div>
              </div>
              <button class="button">
                <b class="label">Send Message</b>
              </button>
            </section>
            <img
              class="illustration-icon"
              loading="lazy"
              alt=""
              src="./public/Illustration.svg"
            />
          </div>
        </section>
        <section class="frame-container">
          <div class="social-row-one-parent">
            <div class="social-row-one">
              <img
                class="tiktok-icon"
                loading="lazy"
                alt=""
                src="assets/TikTok.png"
              />

              <img
                class="whatsapp-icon"
                loading="lazy"
                alt=""
                src="assets/Whatsapp.png"
              />
            </div>
            <div class="social-row-two">
              <img
                class="twitter-icon"
                loading="lazy"
                alt=""
                src="assets/Twitter.png"
              />

              <img
                class="instagram-icon"
                loading="lazy"
                alt=""
                src="assets/Instagram.png"
              />
            </div>
            <div class="frame-div">
              <div class="rectangle-parent2">
                <div class="frame-child2"></div>
                <b class="need-help-container">
                  <span
                    >Need help? 😊<br />
                    Send us a message and we’ll respond quickly. We’re happy to
                    assist you</span
                  >
                  <span class="span">!</span>
                </b>
              </div>
              <div class="social-row-three">
                <img
                  class="email-icon"
                  loading="lazy"
                  alt=""
                  src="assets/Email.png"
                />

                <img
                  class="telegram-icon"
                  loading="lazy"
                  alt=""
                  src="assets/Telegram.png"
                />
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
